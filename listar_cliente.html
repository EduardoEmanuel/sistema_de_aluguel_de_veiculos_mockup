<!doctype html>
<html lang="pt-BR" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Livre'Alugues - Listagem de Clientes</title>
    <script src="./assets/js/color-modes.js"></script>
    <link href="./assets/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./assets/style/product.css" rel="stylesheet" />
    <link href="./assets/style/style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar padrão -->
    <nav class="navbar navbar-expand-md bg-dark sticky-top border-bottom" data-bs-theme="dark">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
          <span class="fw-bold text-white">Livre'Alugues</span>
        </a>
        <div class="navbar-nav gap-3">
          <a class="nav-link" href="index.html">Inicial</a>
          <a class="nav-link active" href="listar_cliente.html">Clientes</a>
          <a class="nav-link" href="listar_modelos_carro.html">Veículos</a>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mb-4 gap-3">
        <h2 class="fw-bold m-0" style="color: #2a5298;">Clientes Registrados</h2>
        <a href="cadastrar_cliente.html" class="btn btn-glass-primary fw-bold shadow-sm">+ Novo Cliente</a>
      </div>

      <div class="table-responsive border rounded shadow-sm bg-body-tertiary">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th scope="col" class="ps-3">Nome</th>
              <th scope="col">CPF</th>
              <th scope="col">Telefone</th>
              <th scope="col">E-mail</th>
              <th scope="col" class="pe-3">Endereço</th>
            </tr>
          </thead>
          <tbody id="tabelaClientes">
            <!-- Inserido dinamicamente via JS -->
          </tbody>
        </table>
      </div>
    </main>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const tabela = document.getElementById('tabelaClientes');
        let listaClientes = JSON.parse(localStorage.getItem('clientes')) || [];

        // Dados mockados iniciais caso o localStorage esteja vazio
        if (listaClientes.length === 0) {
          listaClientes = [
            { nome: "Carlos Eduardo Ramos", cpf: "012.345.678-90", telefone: "(69) 98111-2233", email: "carlos.ramos@email.com", endereco: "Av. Jorge Teixeira, 1200" },
            { nome: "Amanda Silveira Costa", cpf: "987.654.321-00", telefone: "(69) 99222-4455", email: "amanda.costa@email.com", endereco: "Rua Dom Pedro II, 450" }
          ];
          localStorage.setItem('clientes', JSON.stringify(listaClientes));
        }

        tabela.innerHTML = listaClientes.map(cliente => `
          <tr>
            <td class="fw-bold ps-3">${cliente.nome}</td>
            <td>${cliente.cpf}</td>
            <td>${cliente.telefone}</td>
            <td>${cliente.email}</td>
            <td class="pe-3 text-muted">${cliente.endereco}</td>
          </tr>
        `).join('');
      });
    </script>
    <script src="./assets/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
