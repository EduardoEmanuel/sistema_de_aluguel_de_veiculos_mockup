<!doctype html>
<html lang="pt-BR" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Livre'Alugues - Listagem de Veículos</title>
    <script src="./assets/js/color-modes.js"></script>
    <link href="./assets/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./assets/style/product.css" rel="stylesheet" />
    <link href="./assets/style/style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-md site-header sticky-top border-bottom" data-bs-theme="dark">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
          <img src="./assets/brand/rent-a-car-icon-14789.png" alt="Livre'Alugues Logo" class="logo-premium">
          <span class="fw-bold text-white">Livre'Alugues</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvas" aria-controls="offcanvas">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvas" aria-labelledby="offcanvasLabel">
          <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasLabel">Livre'Alugues</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
          </div>
          <div class="offcanvas-body">
            <ul class="navbar-nav flex-grow-1 justify-content-end gap-3">
              <li class="nav-item"><a class="nav-link" href="index.html">Página Inicial</a></li>
              
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Clientes</a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-menu-item dropdown-item" href="cadastrar_cliente.html">Cadastrar Cliente</a></li>
                  <li><a class="dropdown-menu-item dropdown-item" href="listar_cliente.html">Listagem de Clientes</a></li>
                </ul>
              </li>

              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle active" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">Veículos</a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-menu-item dropdown-item" href="cadastrar_modelos_carro.html">Cadastrar Veículo</a></li>
                  <li><a class="dropdown-menu-item dropdown-item active" href="listar_modelos_carro.html">Listagem de Veículos</a></li>
                </ul>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mb-4 gap-3">
        <h2 class="fw-bold m-0" style="color: #2a5298;">Nossa Frota</h2>
        <a href="cadastrar_modelos_carro.html" class="btn btn-glass-primary fw-bold shadow-sm">+ Adicionar Veículo</a>
      </div>

      <div class="table-responsive border rounded shadow-sm bg-body-tertiary">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th scope="col" class="ps-3">Marca / Modelo</th>
              <th scope="col">Ano</th>
              <th scope="col">Placa</th>
              <th scope="col">Diária</th>
              <th scope="col">Status</th>
              <th scope="col" class="text-center pe-3">Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaCarros">
          </tbody>
        </table>
      </div>
    </main>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        renderizarTabela();
      });

      function renderizarTabela() {
        const tabela = document.getElementById('tabelaCarros');
        let listaCarros = JSON.parse(localStorage.getItem('carros')) || [];

        // Adicionados os novos veículos da imagem image_5b659f.jpg com seus preços promocionais correspondentes
        if (listaCarros.length === 0) {
          listaCarros = [
            { marca: "Toyota", modelo: "Corolla", ano: "2026", placa: "BRA2E19", preco: "220.00" },
            { marca: "Chevrolet", modelo: "Onix", ano: "2025", placa: "RND4J12", preco: "140.00" },
            { marca: "Audi", modelo: "Q3 Sportback", ano: "2026", placa: "AUQ3S25", preco: "285.00" },
            { marca: "Jeep", modelo: "Compass Turbo", ano: "2026", placa: "JCP1T15", preco: "221.00" },
            { marca: "Honda", modelo: "Civic Touring", ano: "2025", placa: "HCV1T10", preco: "216.00" }
          ];
          localStorage.setItem('carros', JSON.stringify(listaCarros));
        }

        tabela.innerHTML = listaCarros.map((carro, index) => `
          <tr>
            <td class="ps-3">
              <div class="fw-bold">${carro.marca} ${carro.modelo}</div>
            </td>
            <td>${carro.ano}</td>
            <td><span class="badge bg-secondary">${carro.placa.toUpperCase()}</span></td>
            <td class="fw-bold text-success">R$ ${parseFloat(carro.preco).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
            <td><span class="badge bg-success shadow-sm">Disponível</span></td>
            <td class="text-center pe-3">
              <button onclick="deletarCarro(${index})" class="btn btn-sm btn-outline-danger px-3 rounded-pill fw-semibold">
                Remover
              </button>
            </td>
          </tr>
        `).join('');
      }

      function deletarCarro(index) {
        if (confirm("Tem certeza de que deseja remover este veículo da frota activa?")) {
          let listaCarros = JSON.parse(localStorage.getItem('carros')) || [];
          listaCarros.splice(index, 1);
          localStorage.setItem('carros', JSON.stringify(listaCarros));
          renderizarTabela(); 
        }
      }
    </script>
    <script src="./assets/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
